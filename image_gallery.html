<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      color:#333;
    }
    h1{
      text-align:center;
      padding:20px;
      font-size:40px;
    }
    .filters{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .filters button{
      padding:10px 18px;
      border:none;
      background:#222;
      color:white;
      cursor:pointer;
      border-radius:6px;
      transition:0.3s;
      font-size:16px;
    }
    .filters button:hover{
      background:#555;
      transform:scale(1.05);
    }
    .gallery{
      width:90%;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:20px;
      padding-bottom:40px;
    }
    .gallery img{
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:12px;
      cursor:pointer;
      transition:0.4s;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .gallery img:hover{
      transform:scale(1.05);
      filter:brightness(80%);
    }
     .lightbox{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .lightbox img{
      max-width:85%;
      max-height:85%;
      border-radius:10px;
      animation:zoom 0.3s ease;
    }
    @keyframes zoom{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }
    .close{
      position:absolute;
      top:20px;
      right:30px;
      color:white;
      font-size:45px;
      cursor:pointer;
    }
    .prev,
    .next{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:50px;
      color:white;
      background:none;
      border:none;
      cursor:pointer;
      padding:10px;
      user-select:none;
    }
    .prev{
      left:20px;
    }
    .next{
      right:20px;
    }
    .prev:hover,
    .next:hover{
      color:#ddd;
    }
    @media(max-width:768px){
      h1{
        font-size:30px;
      }
      .gallery img{
        height:200px;
      }
      .prev,
      .next{
        font-size:40px;
      }
    }
    @media(max-width:500px){
      .gallery{
        grid-template-columns:1fr;
      }
      .gallery img{
        height:220px;
      }
    }
  </style>
</head>
<body>

  <h1>Image Gallery</h1>

  <div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
  </div>

  <div class="gallery">
    <img src="https://picsum.photos/id/1015/600/400" class="gallery-img nature">
    <img src="https://picsum.photos/id/1011/600/400" class="gallery-img city">
    <img src="https://picsum.photos/id/1025/600/400" class="gallery-img animals">
    <img src="https://picsum.photos/id/1035/600/400" class="gallery-img nature">
    <img src="https://picsum.photos/id/1043/600/400" class="gallery-img city">
    <img src="https://picsum.photos/id/1062/600/400" class="gallery-img animals">
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img id="lightbox-img" src="">

    <button class="next">&#10095;</button>
  </div>

  <script>
    const galleryImages = document.querySelectorAll(".gallery-img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    const closeBtn = document.querySelector(".close");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");

    let currentIndex = 0;

    galleryImages.forEach((img, index) => {
      img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
      });
    });

    function showImage(){
      lightboxImg.src = galleryImages[currentIndex].src;
    }

    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
    });

    nextBtn.addEventListener("click", () => {
      currentIndex++;

      if(currentIndex >= galleryImages.length){
        currentIndex = 0;
      }
      showImage();
    });

    prevBtn.addEventListener("click", () => {
      currentIndex--;

      if(currentIndex < 0){
        currentIndex = galleryImages.length - 1;
      }
      showImage();
    });

    lightbox.addEventListener("click", (e) => {
      if(e.target === lightbox){
        lightbox.style.display = "none";
      }
    });

    document.addEventListener("keydown", (e) => {
      if(lightbox.style.display === "flex"){

        if(e.key === "ArrowRight"){
          nextBtn.click();
        }

        if(e.key === "ArrowLeft"){
          prevBtn.click();
        }

        if(e.key === "Escape"){
          lightbox.style.display = "none";
        }
      }
    });

    function filterImages(category){

      galleryImages.forEach((img) => {

        if(category === "all"){
          img.style.display = "block";
        }
        else if(img.classList.contains(category)){
          img.style.display = "block";
        }
        else{
          img.style.display = "none";
        }

      });

    }
  </script>

</body>
</html>
